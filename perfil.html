<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | ZyroDev</title>
  <link rel="icon" type="image/png" href="./fotos/favicon.png.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.35), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      transition: 0.4s;
    }

    .card {
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      transition: 0.4s;
    }

    .topo {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .perfil-media-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }

    .foto,
    .video-perfil {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: #111827;
      display: block;
      transition: 0.3s;
    }

    .video-perfil {
      object-fit: cover;
    }

    .video-badge {
      position: absolute;
      right: -4px;
      bottom: -4px;
      min-width: 26px;
      height: 26px;
      border-radius: 999px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      border: 2px solid #0f172a;
      box-shadow: 0 0 14px rgba(124, 58, 237, 0.5);
    }

    .perfil-media-wrap.video-ativa::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.05)
      );
      animation: girarBorda 3s linear infinite;
      z-index: 0;
    }

    .perfil-media-wrap.video-ativa .foto,
    .perfil-media-wrap.video-ativa .video-perfil {
      position: relative;
      z-index: 1;
    }

    @keyframes girarBorda {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .info-topo {
      flex: 1;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 13px;
      margin-bottom: 12px;
      margin-right: 8px;
    }

    .nome-linha {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
    }

    .email {
      color: #cbd5e1;
      margin-bottom: 18px;
      font-size: 16px;
      word-break: break-word;
    }

    .badges-perfil {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge-icon {
      width: 42px;
      height: 42px;
      object-fit: contain;
      margin-left: 6px;
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.6));
      transition: transform 0.25s ease;
    }

    .badge-icon:hover {
      transform: scale(1.2);
    }

    .bio-box {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 18px;
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 24px;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .acoes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      transition: .25s;
    }

    .btn-primary {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .tema-fundador {
      background:
        radial-gradient(circle at top, rgba(255, 215, 0, 0.25), transparent 40%),
        radial-gradient(circle at bottom, rgba(255, 180, 0, 0.2), transparent 40%),
        linear-gradient(135deg, #050505, #1a1200);
    }

    .tema-fundador .card {
      border: 1px solid rgba(255, 215, 0, 0.5);
      background: rgba(20, 15, 0, 0.75);
      box-shadow:
        0 0 30px rgba(255, 215, 0, 0.2),
        0 0 80px rgba(255, 200, 0, 0.15);
    }

    .tema-fundador h1 {
      background: linear-gradient(90deg, #fff3b0, #ffd700, #ffb700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tema-fundador .foto,
    .tema-fundador .video-perfil {
      border: 3px solid gold;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .tema-fundador .tag {
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.4);
      color: #ffd700;
    }

    .tema-fundador .bio-box {
      border: 1px solid rgba(255, 215, 0, 0.25);
      background: rgba(20, 15, 0, 0.6);
    }

    .tema-fundador .btn-primary {
      background: linear-gradient(90deg, #ffd700, #ffb700);
      color: black;
    }

    .tema-fundador .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
      opacity: 0.2;
      animation: brilho 4s linear infinite;
      pointer-events: none;
    }

    @keyframes brilho {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .tema-socio {
      background:
        radial-gradient(circle at top, rgba(255, 215, 0, 0.25), transparent 40%),
        radial-gradient(circle at bottom, rgba(255, 180, 0, 0.2), transparent 40%),
        linear-gradient(135deg, #050505, #1a1200);
    }

    .tema-socio .card {
      border: 1px solid rgba(255, 215, 0, 0.5);
      background: rgba(20, 15, 0, 0.75);
      box-shadow:
        0 0 30px rgba(255, 215, 0, 0.2),
        0 0 80px rgba(255, 200, 0, 0.15);
    }

    .tema-socio h1 {
      background: linear-gradient(90deg, #fff3b0, #ffd700, #ffb700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tema-socio .foto,
    .tema-socio .video-perfil {
      border: 3px solid gold;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .tema-socio .tag {
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.4);
      color: #ffd700;
    }

    .tema-socio .bio-box {
      border: 1px solid rgba(255, 215, 0, 0.25);
      background: rgba(20, 15, 0, 0.6);
    }

    .tema-socio .btn-primary {
      background: linear-gradient(90deg, #ffd700, #ffb700);
      color: black;
    }

    .tema-socio .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
      opacity: 0.2;
      animation: brilhoSocio 4s linear infinite;
      pointer-events: none;
    }

    @keyframes brilhoSocio {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px;
      }

      .topo {
        flex-direction: column;
        align-items: flex-start;
      }

      h1 {
        font-size: 26px;
      }

      .acoes {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }

.tema-vip-esmeralda {
  background:
    radial-gradient(circle at top left, rgba(16, 255, 179, 0.28), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0, 255, 157, 0.20), transparent 35%),
    linear-gradient(135deg, #031611, #06241c, #041b15);
}

.tema-vip-esmeralda .card {
  border: 1px solid rgba(34, 255, 178, 0.45);
  background:
    linear-gradient(135deg, rgba(3, 30, 24, 0.94), rgba(2, 22, 18, 0.92));
  box-shadow:
    0 0 18px rgba(0, 255, 170, 0.18),
    0 0 40px rgba(0, 255, 170, 0.14),
    0 0 90px rgba(0, 255, 170, 0.12);
}

.tema-vip-esmeralda h1 {
  background: linear-gradient(90deg, #ecfff8 0%, #8affd4 30%, #19f5a8 60%, #c8ffef 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: brilhoNomeVip 3s linear infinite;
  text-shadow: 0 0 14px rgba(25, 245, 168, 0.28);
}

.tema-vip-esmeralda .foto,
.tema-vip-esmeralda .video-perfil {
  border: 3px solid #33ffbb;
  box-shadow:
    0 0 12px rgba(51, 255, 187, 0.45),
    0 0 24px rgba(51, 255, 187, 0.30);
}

.tema-vip-esmeralda .tag {
  background: rgba(0, 255, 157, 0.10);
  border: 1px solid rgba(51, 255, 187, 0.30);
  color: #aaffde;
  box-shadow: 0 0 12px rgba(0, 255, 157, 0.08);
}

.tema-vip-esmeralda .bio-box {
  border: 1px solid rgba(51, 255, 187, 0.18);
  background: rgba(1, 25, 19, 0.75);
  box-shadow: inset 0 0 18px rgba(0, 255, 157, 0.04);
}

.tema-vip-esmeralda .btn-primary {
  background: linear-gradient(90deg, #16f2a3, #00c97f);
  color: #ffffff;
  box-shadow:
    0 8px 20px rgba(0, 255, 157, 0.22),
    0 0 18px rgba(0, 255, 157, 0.12);
}

.tema-vip-esmeralda .btn-primary:hover {
  transform: translateY(-2px);
  box-shadow:
    0 12px 28px rgba(0, 255, 157, 0.28),
    0 0 22px rgba(0, 255, 157, 0.18);
}

.tema-vip-esmeralda .card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.10) 45%,
    transparent 75%
  );
  opacity: 0.22;
  animation: brilhoVipEsmeralda 4s linear infinite;
  pointer-events: none;
}

.tema-vip-esmeralda .badge-icon {
  filter:
    drop-shadow(0 0 6px rgba(0, 255, 170, 0.30))
    drop-shadow(0 0 12px rgba(0, 255, 170, 0.20));
}

@keyframes brilhoVipEsmeralda {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(120%); }
}

@keyframes brilhoNomeVip {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
    
.tema-vip-perola-negra {
  background:
    radial-gradient(circle at top, rgba(168, 85, 247, 0.22), transparent 35%),
    linear-gradient(180deg, #09060f 0%, #12091c 45%, #1a0f2b 100%);
}

.tema-vip-perola-negra .profile-card,
.tema-vip-perola-negra .config-box,
.tema-vip-perola-negra .perfil-box {
  border: 1px solid rgba(168, 85, 247, 0.28);
  box-shadow:
    0 10px 30px rgba(0, 0, 0, 0.35),
    0 0 18px rgba(168, 85, 247, 0.12);
}

  </style>
</head>

<body id="bodyPerfil">
  <div class="card">
    <div class="topo">
      <div id="perfilMediaWrap" class="perfil-media-wrap">
        <img id="fotoPerfil" class="foto" src="" alt="Foto do perfil">
      </div>

      <div class="info-topo">
        <div class="tag">Conta conectada</div>
        <div class="tag">Temporada 1</div>

        <div class="nome-linha">
          <h1 id="nomePerfil">Carregando...</h1>
          <span id="badgesPerfil" class="badges-perfil"></span>
        </div>
      </div>
    </div>

    <div class="bio-box" id="bioPerfil">Sua bio aparece aqui.</div>

    <div class="acoes">
      <a href="editar-perfil.html" class="btn btn-primary">Editar perfil</a>
      <a href="index.html" class="btn btn-primary">Voltar ao início</a>
      <button class="btn btn-secondary" id="btnSair">Sair da conta Google</button>
    </div>
  </div>

  <script type="module" src="./perfil.js"></script>
</body>

</html>
