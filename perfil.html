<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | ZyroDev</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.35), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .topo {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .foto {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: #111827;
    }

    .info-topo {
      flex: 1;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .nome-linha {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      margin: 0;
    }

    .email {
      color: #cbd5e1;
      margin-bottom: 18px;
      font-size: 16px;
      word-break: break-word;
    }

    .badges-perfil {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge-icon {
  width: 42px;
  height: 42px;
  object-fit: contain;
  margin-left: 6px;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.6));
  transition: transform 0.25s ease;
}

.badge-icon:hover {
  transform: scale(1.2);
}

    .bio-box {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 18px;
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 24px;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .acoes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      transition: .25s;
    }

    .btn-primary {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="topo">
      <img id="fotoPerfil" class="foto" src="" alt="Foto do perfil">

      <div class="info-topo">
        <div class="tag">Conta conectada</div>
        <div class="tag">Temporada 1</div>

        <div class="nome-linha">
          <h1 id="nomePerfil">Carregando...</h1>
          <span id="badgesPerfil" class="badges-perfil"></span>
        </div>

        <div class="email" id="emailPerfil">Carregando email...</div>
      </div>
    </div>

    <div class="bio-box" id="bioPerfil">Sua bio aparece aqui.</div>

    <div class="acoes">
      <a href="editar-perfil.html" class="btn btn-primary">Editar perfil</a>
      <a href="index.html" class="btn btn-primary">Voltar ao início</a>
      <button class="btn btn-secondary" id="btnSair">Sair da conta Google</button>
    </div>
  </div>

  <script type="module" src="./perfil.js"></script>
</body>

</html>
